<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 - 页面不存在 | Jimday 官方网站</title>
	<meta name="robots" content="noindex,nofollow">
	<meta name="description" content="Jimday网站 404错误，您访问的页面不存在或已删除。系统将自动返回首页，为您带来不便敬请谅解。">
	<link rel="canonical" href="http://jimday.cn/">
	<meta property="og:title" content="404 - 页面不存在 | Jimday">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://www.jimday.cn/">
	
	<!-- 配置变量 - 请根据需要修改以下变量 -->
	<script>
		const REDIRECT_URL = 'https://www.jimday.cn/'; // 跳转目标网址 - 修改为您的主页地址
		const COPYRIGHT_INFO = 'Copyright © Jimday.cn All Rights Reserved. Template from Cola0908 | Modified by 豆包 AI'; // 版权信息 - 修改为您的版权声明
	</script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			overflow: hidden;
			position: relative;
			color: #fff;
		}
		
		/* 背景动画星星 */
		.stars {
			position: absolute;
			width: 100%;
			height: 100%;
			z-index: 1;
		}
		
		.star {
			position: absolute;
			background: white;
			border-radius: 50%;
			animation: twinkle 2s infinite;
		}
		
		@keyframes twinkle {
			0%, 100% { opacity: 0.3; transform: scale(1); }
			50% { opacity: 1; transform: scale(1.2); }
		}
		
		.floating-planets {
			position: absolute;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 2;
		}
		
		.planet {
			position: absolute;
			font-size: 2.5rem;
			opacity: 0.6;
			animation: planetFloat 8s ease-in-out infinite;
		}
		
		@keyframes planetFloat {
			0%, 100% { transform: translateY(0px) rotate(0deg); }
			50% { transform: translateY(-15px) rotate(10deg); }
		}

		@keyframes ufoFloat {
			0%, 100% { transform: translateX(0px) translateY(0px) rotate(0deg); }
			50% { transform: translateX(8px) translateY(-15px) rotate(10deg); }
		}
		
		/* 主容器 */
		.container {
			text-align: center;
			z-index: 10;
			position: relative;
			max-width: 600px;
			padding: 20px;
			animation: fadeIn 1.2s ease-out;
		}
		
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}
		
		/* 404数字动画 */
		.error-code {
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 20px;
			cursor: pointer;
		}
		
		.error-code .num {
			font-size: 8rem;
			font-weight: 700;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
			text-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
			transition: all 0.3s ease;
		}
		
		.error-code:hover .num {
			transform: scale(1.02);
		}
		
		.error-code .moon {
			font-size: 7.2rem;
			animation: moonFloat 4s ease-in-out infinite;
			display: inline-block;
			margin: 0 -15px;
			z-index: 2;
			filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
		}
		
		@keyframes moonFloat {
			0%, 100% { transform: translateY(0px); }
			50% { transform: translateY(-8px); }
		}
		
		.moon.wave {
			animation: moonWave 0.6s ease-in-out;
		}
		
		@keyframes moonWave {
			0%, 100% { transform: translateY(0) rotate(0deg); }
			25% { transform: translateY(-3px) rotate(3deg); }
			75% { transform: translateY(-3px) rotate(-3deg); }
		}
		
		/* 404专属柔和点击动画 */
		.error-code.shake .num {
			animation: numShake 0.5s ease-in-out;
		}
		
		@keyframes numShake {
			0%, 100% { transform: translateX(0); }
			25% { transform: translateX(-2px); }
			75% { transform: translateX(2px); }
		}
		
		/* 标题和描述 */
		.title {
			font-size: 2rem;
			margin-bottom: 15px;
			font-weight: 500;
			color: #fff;
			animation: fadeInUp 1s ease-out 0.2s both;
		}
		
		.description {
			font-size: 1.1rem;
			margin-bottom: 30px;
			opacity: 0.8;
			color: #a8b2d1;
			line-height: 1.6;
			animation: fadeInUp 1s ease-out 0.4s both;
		}
		
		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(30px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
		
		/* 倒计时样式 */
		.countdown {
			font-size: 1.1rem;
			margin-bottom: 20px;
			padding: 12px 24px;
			background: rgba(255, 255, 255, 0.08);
			border-radius: 12px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			display: inline-block;
			color: #e6e9f0;
			backdrop-filter: blur(10px);
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
			transition: all 0.3s ease;
		}
		
		/* 进度条 */
		.progress-bar {
			width: 100%;
			height: 4px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 2px;
			margin: 0 auto 30px;
			overflow: hidden;
			max-width: 300px;
		}
		
		.progress-fill {
			height: 100%;
			background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
			border-radius: 2px;
			transition: width 1s linear;
			width: 0%;
			box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
		}
		
		/* 按钮样式 */
		.home-button {
			display: inline-block;
			padding: 14px 36px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			text-decoration: none;
			border-radius: 12px;
			font-size: 1rem;
			font-weight: 500;
			transition: all 0.3s ease;
			box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
			position: relative;
			overflow: hidden;
			animation: fadeInUp 1s ease-out 0.6s both;
		}
		
		.home-button:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
		}
		
		.home-button:active {
			transform: translateY(-1px);
		}
		
		/* 按钮波纹样式 */
		.ripple {
			position: absolute;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.3);
			transform: scale(0);
			animation: ripple-animation 0.6s ease-out;
			pointer-events: none;
		}
		@keyframes ripple-animation {
			to {
				transform: scale(4);
				opacity: 0;
			}
		}
		
		/* 版权信息样式 */
		.copyright {
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 0.75rem;
			color: #8892b0;
			text-align: center;
			letter-spacing: 0.3px;
			background: rgba(255, 255, 255, 0.05);
			padding: 8px 16px;
			border-radius: 20px;
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.08);
			transition: all 0.3s ease;
			z-index: 10;
		}
		
		.copyright:hover {
			transform: translateX(-50%) translateY(-2px);
			background: rgba(255, 255, 255, 0.08);
		}
		
		/* 响应式设计 */
		@media (max-width: 768px) {
			.error-code .num {
				font-size: 5rem;
			}
			.error-code .moon {
				font-size: 4.6rem;
				margin: 0 -10px;
			}
			.title {
				font-size: 1.6rem;
			}
			.description {
				font-size: 1rem;
			}
			.countdown {
				font-size: 1rem;
				padding: 10px 20px;
			}
			.copyright {
				font-size: 0.7rem;
				bottom: 15px;
				padding: 6px 12px;
			}
		}
	</style>
</head>
<body>
	<div class="stars" id="stars"></div><!-- 背景星星 -->
	<div class="floating-planets" id="planets"></div><!-- 漂浮图标容器 -->
	
	<div class="container">
		<div class="error-code" id="errorCode" onclick="triggerMoonWave()">
			<span class="num">4</span>
			<span class="moon" id="moon">🌕</span>
			<span class="num">4</span>
		</div>
		
		<h1 class="title">哎呀，你找的页面跑到月亮上去啦~</h1>
		<p class="description">小月亮迷路了，我们正在努力把它找回来，带你回到正轨...</p>
		
		<div class="countdown" id="countdown">
			<span id="timer">15</span> 秒后自动返回首页
		</div>
		<div class="progress-bar">
			<div class="progress-fill" id="progressFill"></div>
		</div>
		
		<a href="https://www.jimday.cn/" class="home-button" id="homeButton"> 立即回家 </a>
	</div>
	
	<div class="copyright" id="copyrightText"></div><!-- 版权信息 -->

	<script>
		// 创建星星背景
		function createStars() {
			const starsContainer = document.getElementById('stars');
			const numberOfStars = 80;
			
			for (let i = 0; i < numberOfStars; i++) {
				const star = document.createElement('div');
				star.className = 'star';
				star.style.left = Math.random() * 100 + '%';
				star.style.top = Math.random() * 100 + '%';
				const size = Math.random() * 3 + 1 + 'px';
				star.style.width = size;
				star.style.height = size;
				star.style.animationDelay = Math.random() * 2 + 's';
				starsContainer.appendChild(star);
			}
		}
		
		// 创建漂浮图标
		function createPlanets() {
			const container = document.getElementById('planets');
			const planets = ['🪐', '🌙', '⭐', '💫', '🛸'];
			planets.forEach((planet, index) => {
				const el = document.createElement('div');
				el.className = 'planet';
				el.textContent = planet;
				if(index < 4) {
					el.style.left = `${5 + (index * 22)}%`;
					el.style.top = `${10 + (index * 18)}%`;
					el.style.animationDelay = `${index * 1.5}s`;
				} else {
					el.style.left = '88%';
					el.style.top = '85%';
					el.style.animation = 'ufoFloat 8s ease-in-out infinite';
					el.style.animationDelay = '6s';
				}
				container.appendChild(el);
			});
		}
		
		function triggerMoonWave() {
			const moon = document.getElementById('moon');
			const errorCode = document.getElementById('errorCode');
			
			if(moon.classList.contains('wave')) return;
			
			moon.classList.add('wave');
			errorCode.classList.add('shake');
			
			setTimeout(() => {
				moon.classList.remove('wave');
				errorCode.classList.remove('shake');
			}, 600);
		}
		
		// 倒计时功能
		let timeLeft = 15;
		const timerElement = document.getElementById('timer');
		const progressFill = document.getElementById('progressFill');
		const countdownElement = document.getElementById('countdown');
		
		function updateCountdown() {
			timerElement.textContent = timeLeft;
			const progressPercent = ((15 - timeLeft) / 15) * 100;
			progressFill.style.width = progressPercent + '%';
			
			if (timeLeft <= 3) {
				countdownElement.style.background = 'rgba(231, 76, 60, 0.15)';
				countdownElement.style.color = '#e74c3c';
				countdownElement.style.borderColor = 'rgba(231, 76, 60, 0.2)';
			} else if (timeLeft <= 5) {
				countdownElement.style.background = 'rgba(243, 156, 18, 0.15)';
				countdownElement.style.color = '#f39c12';
				countdownElement.style.borderColor = 'rgba(243, 156, 18, 0.2)';
			}
			
			if (timeLeft <= 0) {
				window.location.href = REDIRECT_URL;
				return;
			}
			
			timeLeft--;
			setTimeout(updateCountdown, 1000);
		}
		
		document.getElementById('homeButton').addEventListener('click', function(e) {
			const x = e.clientX - this.getBoundingClientRect().left;
			const y = e.clientY - this.getBoundingClientRect().top;
			
			const ripple = document.createElement('span');
			ripple.className = 'ripple';
			ripple.style.left = x + 'px';
			ripple.style.top = y + 'px';
			this.appendChild(ripple);
			
			setTimeout(() => ripple.remove(), 600);
		}); 
		
		// 初始化配置
		function initializeConfig() {
			document.getElementById('copyrightText').textContent = COPYRIGHT_INFO;
		}
		
		// 初始化所有功能
		createStars();
		createPlanets();
		updateCountdown();
		initializeConfig();
	</script>
</body>
</html>
