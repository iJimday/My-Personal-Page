<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<title>其他 - 阿戴主页</title>
	<link rel="stylesheet" type="text/css" href="/assets/css/style.css"><!--主体CSS-->
	<link rel="stylesheet" type="text/css" href="/assets/css/all.min.css"><!--fontawesome-->
	<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
	<script>
		$(function() {
			$("#headerpage").load("/assets/public/header.html");
			$("#footerpage").load("/assets/public/footer.html");
		});
	</script>
</head>

<body>
	<div id="headerpage"></div>
	<div class="main-container">
		<!-- 顶部个人信息区 -->
		<div class="profile-section">
			<div class="profile-content">
				<div class="avatar-wrapper" id="themeToggle">
					<div class="avatar">戴</div>
					<div class="avatar-tooltip">点击切换深色模式</div>
				</div>
				<div class="profile-name"><i class="fa-solid fa-at"></i>Jimday</div>
				<div class="profile-bio">
					众里寻他千百度。蓦然回首，那人却在，灯火阑珊处。<br>
					【宋代】辛弃疾《青玉案·元夕》
				</div>
			</div>
		</div>

		<!-- 下方站点列表区 -->
		<div class="sites-section">
			<div class="sites-header">
				<h2 class="sites-title">其他</h2>
				<span class="sites-count">0个</span>
			</div>

			<div class="sites-grid">
				<a href="/" rel="noopener noreferrer" class="site-card" style="animation-delay: 0s;">
					<div class="site-card-content">
						<div class="site-icon">我 </div>
						<div class="site-info">
							<div class="site-name">返回主页&nbsp;<i class="fa-solid fa-rotate-left"></i></div>
							<div class="site-desc">返回我的个人主页</div>
						</div>
					</div>
					<div class="site-card-footer">
						<div class="site-url"><i class="fa-solid fa-arrow-up-right-from-square"></i>Jimday.cn</div>
					</div>
				</a>
			</div>
		</div>

		<!-- 底部版权栏 -->
		<footer class="footer">
			<div class="footer-content">
				<p>想当年，金戈铁马，气吞万里如虎。</p>
				<p>&copy; <span id="year"></span> Jimday. All Rights Reserved.&nbsp;
					<div id="footerpage"></div>
				</p>
			</div>
		</footer>
	</div>
	
	<!-- 弹窗结构 -->
	<div class="modal-overlay" id="modalOverlay">
		<div class="modal-box">
			<div class="modal-title">模板说明</div>
			<div class="modal-desc">本站模板源自 caonb.cn 原版魔改优化，由豆包负责疯狂的微微微微微微微微微微微微微微微调，Jimday 匠心打磨设计，仅限个人玩耍使用，未经允许严禁转载、拿去商用哦🈲！</div>
			<button class="modal-close" id="modalClose">明白明白</button>
		</div>
	</div>

	<!--translate.zvo.cn-->
	<script src="/assets/js/translate.js"></script>
	<!--translate.js settings-->
	<script src="/assets/js/translate-config.js"></script>
	
	<script src="/assets/js/main.js"></script>
	
	<!--translate.zvo.cn-->
	<script>
		translate.execute(); //dom加载完后，进行translate.js 触发翻译的执行
		translate.isTranslateExecute('english'); //当前是否已进行了翻译处理
	</script>
</body>
</html>
